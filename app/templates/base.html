<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Student Management Portal</title>

    <!-- ===== FAVICON ===== -->
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='img/favicon/apple-touch-icon.png') }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='img/favicon/favicon-32x32.png') }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='img/favicon/favicon-16x16.png') }}">
    <link rel="manifest" href="{{ url_for('static', filename='img/favicon/site.webmanifest') }}">
    <!-- ==================== -->

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        html, body {
            height: 100%;
        }
        body {
            display: flex;
            flex-direction: column;
        }
        .container-fluid {
            flex: 1;
        }
    </style>
</head>
<body>

    <!-- Offcanvas Sidebar (mobile) -->
    <div class="offcanvas offcanvas-start" tabindex="-1" id="sidebarOffcanvas">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title">Menu</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body p-0">
            {% block sidebar %}{% endblock %}
        </div>
    </div>

    <!-- ===== TOP BAR ===== -->
    {% include 'includes/topbar.html' %}
    <!-- =================== -->

    <!-- Main content -->
    <div class="container-fluid">
        <div class="row">
            <!-- Desktop Sidebar -->
            <div class="col-md-3 col-lg-2 d-none d-md-block bg-light sidebar vh-100">
                {% block sidebar_desktop %}{% endblock %}
            </div>
            <div class="col-md-9 col-lg-10">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>

    <!-- ===== FOOTER (LIGHT) ===== -->
    <footer class="footer mt-auto py-4 bg-light text-dark border-top">
        <div class="container text-center">
            <div class="row">
                <div class="col-12">
                    <p class="mb-0">&copy; 2026 NGPI . All rights reserved.</p>
                    <p class="mb-0 small text-muted">
                        Developed by <span class="text-primary fw-bold">Sopan Das</span>
                    </p>
                </div>
            </div>
        </div>
    </footer>
    <!-- ========================= -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
