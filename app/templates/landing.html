<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Student Management Portal</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
    <!-- Google Fonts Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        /* Full viewport height, centered content */
        .landing-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #f8f9fa;
            text-align: center;
            padding: 20px;
        }
        .landing-container img {
            max-height: 150px;
            margin-bottom: 20px;
        }
        .landing-container h1 {
            font-size: 3rem;
            font-weight: 700;
            color: #0d6efd;
        }
        .landing-container p {
            font-size: 1.25rem;
            color: #6c757d;
            margin-bottom: 30px;
        }
        .btn-group-custom {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn-group-custom .btn {
            min-width: 150px;
            padding: 12px 30px;
            font-size: 1.1rem;
        }
        @media (max-width: 576px) {
            .landing-container h1 {
                font-size: 2rem;
            }
            .btn-group-custom .btn {
                min-width: 120px;
                padding: 10px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="landing-container">
        <!-- College Logo -->
        <img src="{{ url_for('static', filename='img/college_logo.png') }}" alt="College Logo">
        
        <!-- Project Name -->
        <h1>NGPI Smart Student Portal</h1>
        <p>Secure Access for Verified Students</p>
        
        <!-- Sign Up & Login Buttons -->
        <div class="btn-group-custom">
            <a href="{{ url_for('auth.register') }}" class="btn btn-primary">Sign Up</a>
            <a href="{{ url_for('auth.login') }}" class="btn btn-outline-primary">Login</a>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
