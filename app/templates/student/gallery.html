{% extends "base.html" %}

{% block sidebar %}{% include 'includes/student_sidebar.html' %}{% endblock %}
{% block sidebar_desktop %}{% include 'includes/student_sidebar.html' %}{% endblock %}

{% block content %}
<div class="p-4">
    <h2>Gallery</h2>
    <div class="row">
        {% for image in images %}
        <div class="col-md-3 mb-3">
            <div class="card">
                <img src="{{ url_for('static', filename='uploads/gallery/'+image.image_path) }}" class="card-img-top" style="height:200px; object-fit:cover;">
                <div class="card-body">
                    <p class="card-text">{{ image.caption }}</p>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
